@if (isOpen()) {
  <!-- Overlay backdrop -->
  <div
    class="panel-backdrop"
    (click)="close()"
    aria-hidden="true"
  ></div>
}

<!-- Panel -->
<aside
  class="knowledge-panel"
  [@panelSlide]="isOpen() ? 'open' : 'closed'"
  [attr.aria-hidden]="!isOpen() || null"
  [attr.inert]="!isOpen() || null"
  role="complementary"
  aria-label="Contextual help panel"
>
  <div class="panel-toolbar">
    <span class="panel-title">Help</span>
    <div class="panel-actions">
      <button
        mat-icon-button
        (click)="openFullViewer()"
        matTooltip="Open full viewer"
        aria-label="Open in full knowledge viewer"
      >
        <mat-icon>open_in_new</mat-icon>
      </button>
      <button
        mat-icon-button
        (click)="close()"
        matTooltip="Close"
        aria-label="Close help panel"
      >
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>

  <div class="panel-content">
    @if (articlePath()) {
      <app-article-view
        [articlePath]="articlePath()!"
        [compact]="true"
      ></app-article-view>
    }
  </div>
</aside>
