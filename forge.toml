# forge.toml — Project configuration for the autonomous development pipeline
#
# This is the single source of truth for your project's autodev settings.
# Generated by `/onboard` or edited manually.
#
# Documentation: https://github.com/rnwolfe/forge

[project]
name = ""                          # Project name (e.g., "myproject")
repo = ""                          # GitHub org/repo (e.g., "org/myproject")
description = ""                   # One-line project description
base_branch = "main"               # Default branch for PRs

[stack]
language = ""                      # Primary language: go, node, python, rust, java, etc.
build_command = ""                 # Build command (e.g., "make build", "npm run build")
test_command = ""                  # Test command (e.g., "make test", "npm test")
lint_command = ""                  # Lint command (optional, e.g., "go vet ./...", "npm run lint")
release_tool = "none"              # Release tool: goreleaser, npm, cargo, pypi, docker, none

[gating]
human_merge_required = true        # Require human to merge PRs (Level 1-2)
auto_merge_after_review = false    # Auto-merge after all reviews pass (Level 2+)
copilot_review = true              # Enable Copilot review phase
claude_review = true               # Enable Claude review phase
max_copilot_iterations = 3         # Max Copilot fix cycles before escalating to Claude
max_claude_iterations = 1          # Max Claude fix cycles
require_human_review_for = ["*"]   # Glob patterns requiring human review; ["*"] = everything, [] = nothing

[dispatch]
cron_schedule = "0 */1 * * *"      # How often to check for ready issues (cron expression)
max_concurrent_prs = 1             # Max open autodev PRs at once

[agent]
provider = "claude"                # AI provider: claude (others are stubs)
model = "claude-sonnet-4-6"        # Model for agent execution
max_implement_turns = 150          # Max agent turns for implementation
max_review_turns = 50              # Max agent turns for review fixes
implement_timeout_minutes = 60     # Timeout for implementation workflow
review_timeout_minutes = 45        # Timeout for review-fix workflow

[trust]
trusted_users = []                 # GitHub logins that can trigger autodev via backlog/ready label
human_reviewer = ""                # GitHub login for CODEOWNERS (auto-added by GitHub, removed from autodev PRs)

[commits]
convention = "conventional"    # Commit message format enforced by commitlint
types = ["feat", "fix", "chore", "docs", "refactor", "test", "ci", "build", "perf", "style", "revert"]
# Agents must use: type: description (lowercase, no scope, no trailing period)

[protected_files]
patterns = [                       # Files the agent cannot modify (reverted after each run)
    "CLAUDE.md",
    ".github/workflows/",
    "scripts/autodev/",
    "forge.toml",
]
