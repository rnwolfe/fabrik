# forge.toml — Project configuration for the autonomous development pipeline
#
# This is the single source of truth for your project's autodev settings.
# Generated by `/onboard` or edited manually.
#
# Documentation: https://github.com/rnwolfe/forge

[project]
name = "fabrik"
repo = "rnwolfe/fabrik"
description = "Design-time tool for planning datacenter network topologies at any scale"
base_branch = "main"

# Go backend + Angular frontend
[stack]
language = "go+node"
build_command = "make build"
test_command = "make test"
lint_command = "make lint"
release_tool = "npm"

# Level 4: fully autonomous
[gating]
human_merge_required = false
auto_merge_after_review = true
copilot_review = true
claude_review = true
max_copilot_iterations = 3
max_claude_iterations = 1
require_human_review_for = []      # [] = no human review required

[dispatch]
cron_schedule = "0 */1 * * *"      # How often to check for ready issues
max_concurrent_prs = 1

[agent]
provider = "claude"
model = "claude-sonnet-4-6"
max_implement_turns = 150
max_review_turns = 50
implement_timeout_minutes = 60
review_timeout_minutes = 45

[trust]
trusted_users = ["rnwolfe"]
human_reviewer = "rnwolfe"

[commits]
convention = "conventional"
types = ["feat", "fix", "chore", "docs", "refactor", "test", "ci", "build", "perf", "style", "revert"]
# Agents must use: type: description (lowercase, no scope, no trailing period)

[protected_files]
patterns = [
    "CLAUDE.md",
    ".github/workflows/",
    "scripts/autodev/",
    "forge.toml",
]
